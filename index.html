<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High Flyer - Premium</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse-red {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.05); }
        }
        .animate-pulse-red {
            animation: pulse-red 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        /* Gizli scrollbar */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-[#030712] text-white antialiased font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function PlaneIcon({ className, style }) {
            return (
                <svg viewBox="0 0 24 24" fill="currentColor" className={className} style={style}>
                    <path d="M21,16V14L13,9V3.5A1.5,1.5 0 0,0 11.5,2A1.5,1.5 0 0,0 10,3.5V9L2,14V16L10,13.5V19L8,20.5V22L11.5,21L15,22V20.5L13,19V13.5L21,16Z" />
                </svg>
            );
        }

        function HighFlyerGame() {
            const [gameState, setGameState] = useState('IDLE'); // IDLE, FLYING, CRASHED
            const [multiplier, setMultiplier] = useState(1.00);
            const [crashPoint, setCrashPoint] = useState(0);
            const [balance, setBalance] = useState(1000);
            const [betAmount, setBetAmount] = useState(10);
            const [history, setHistory] = useState([]);
            const [isCashedOut, setIsCashedOut] = useState(false);
            const [winAmount, setWinAmount] = useState(0);

            const startGame = () => {
                if (balance < betAmount) return alert("⚠️ Yetersiz Bakiye!");
                setBalance(prev => prev - betAmount);
                setGameState('FLYING');
                setMultiplier(1.00);
                setIsCashedOut(false);
                setWinAmount(0);
                
                // Daha gerçekçi patlama noktası (1.01x - 100x arası)
                const crash = Math.floor((0.98 / (1 - Math.random())) * 100) / 100;
                setCrashPoint(Math.min(Math.max(crash, 1.01), 100));
            };

            const cashOut = () => {
                if (gameState !== 'FLYING' || isCashedOut) return;
                const profit = betAmount * multiplier;
                setBalance(prev => prev + profit);
                setWinAmount(profit);
                setIsCashedOut(true);
                // Burada setGameState('CRASHED') demiyoruz, uçuş devam etsin!
            };

            useEffect(() => {
                let interval;
                if (gameState === 'FLYING') {
                    interval = setInterval(() => {
                        setMultiplier(prev => {
                            // Çarpan yükseldikçe artış hızı artar
                            const next = prev + (prev * 0.006) + 0.01; 
                            if (next >= crashPoint) {
                                clearInterval(interval);
                                setGameState('CRASHED');
                                setHistory(h => [crashPoint.toFixed(2), ...h].slice(0, 10)); // Son 10 oyun
                                return crashPoint;
                            }
                            return next;
                        });
                    }, 50); // Daha akıcı bir artış için 50ms
                }
                return () => clearInterval(interval);
            }, [gameState, crashPoint]);

            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-4">
                    <div className="w-full max-w-lg bg-[#111827] p-8 rounded-[2rem] shadow-[0_20px_60px_-15px_rgba(239,68,68,0.15)] border border-[#1f2937]">
                        
                        {/* Üst Bar - Bakiye ve Geçmiş */}
                        <div className="flex justify-between items-center mb-8 gap-4">
                            <div className="flex items-center gap-3 bg-[#1f2937] px-6 py-3 rounded-full border border-green-500/20 shadow-inner">
                                <span className="text-xl">💰</span>
                                <span className="text-2xl font-black text-green-400 tabular-nums">
                                    {balance.toFixed(2)} ₺
                                </span>
                            </div>
                            <div className="flex gap-2 overflow-x-auto max-w-[200px] no-scrollbar py-1">
                                {history.map((h, i) => {
                                    const hNum = Number(h);
                                    let colorClass = "bg-[#1f2937] text-white";
                                    if (hNum > 10) colorClass = "bg-red-600 text-white";
                                    else if (hNum > 5) colorClass = "bg-purple-600 text-white";
                                    else if (hNum > 2) colorClass = "bg-blue-600 text-white";
                                    else if (hNum > 1.5) colorClass = "bg-green-600 text-white";

                                    return (
                                        <span key={i} className={`text-xs px-3 py-1.5 rounded-full font-bold tabular-nums whitespace-nowrap shadow-md ${colorClass}`}>
                                            {h}x
                                        </span>
                                    );
                                })}
                            </div>
                        </div>
                        
                        {/* Ana Uçuş Ekranı */}
                        <div className="relative h-80 bg-[#030712] rounded-3xl mb-8 overflow-hidden flex items-center justify-center border-2 border-[#1f2937] shadow-xl">
                            
                            {/* Arka Plan Çizgileri */}
                            <div className="absolute inset-0 grid grid-cols-6 grid-rows-4 opacity-10">
                                {[...Array(24)].map((_, i) => <div key={i} className="border border-[#1f2937]" />)}
                            </div>

                            {/* Çarpan Göstergesi */}
                            <div className={`relative z-10 text-8xl font-black transition-colors duration-300 tabular-nums ${gameState === 'CRASHED' ? 'text-red-600' : isCashedOut ? 'text-green-500' : 'text-white'}`}>
                                {multiplier.toFixed(2)}x
                            </div>
                            
                            {/* Uçak Animasyonu */}
                            {gameState === 'FLYING' && (
                                <div className="absolute w-full h-full pointer-events-none">
                                     <PlaneIcon className="absolute w-20 h-20 text-red-500 animate-pulse transition-all duration-300 ease-linear" 
                                     style={{
                                         // Çarpan yükseldikçe uçak daha yukarı ve sağa gider
                                         bottom: `${Math.min(15 + (multiplier * 4), 75)}%`, 
                                         left: `${Math.min(10 + (multiplier * 4), 75)}%`,
                                         transform: 'rotate(-10deg)',
                                         filter: 'drop-shadow(0 0 15px rgba(239, 68, 68, 0.7))'
                                     }} />
                                </div>
                            )}

                            {/* Patlama Mesajı */}
                            {gameState === 'CRASHED' && (
                                <div className="absolute top-6 left-1/2 -translate-x-1/2 bg-red-600/10 text-red-500 px-6 py-2 rounded-full text-lg font-bold border border-red-900/40 animate-pulse-red">
                                    PATLADI! 🔥
                                </div>
                            )}
                        </div>

                        {/* Kazanç Bilgisi */}
                        {isCashedOut && (
                            <div className="bg-green-500/10 text-green-400 p-5 rounded-2xl mb-6 text-center text-xl font-bold border border-green-900/30 animate-fade-in shadow-lg">
                                🎉 Tebrikler! Kazandın: +{winAmount.toFixed(2)} ₺
                            </div>
                        )}

                        {/* Kontrol Paneli */}
                        <div className="grid grid-cols-3 gap-6 items-center">
                            {/* Bahis Miktarı Ayarı */}
                            <div className="col-span-1 flex items-center gap-3 bg-[#1f2937] p-3 rounded-2xl shadow-inner border border-[#374151]">
                                <button onClick={() => setBetAmount(Math.max(10, betAmount - 10))} className="bg-[#111827] w-12 h-12 rounded-xl text-3xl font-bold active:scale-95 transition-all text-white hover:bg-[#111827]/80">-</button>
                                <input 
                                    type="number" 
                                    value={betAmount} 
                                    onChange={(e) => setBetAmount(Number(e.target.value))}
                                    className="flex-1 bg-transparent text-center font-black text-2xl outline-none tabular-nums"
                                    disabled={gameState === 'FLYING'}
                                    step="10"
                                    min="10"
                                />
                                <button onClick={() => setBetAmount(betAmount + 10)} className="bg-[#111827] w-12 h-12 rounded-xl text-3xl font-bold active:scale-95 transition-all text-white hover:bg-[#111827]/80">+</button>
                            </div>

                            {/* Ana Buton (Bahis / Nakit Çek) */}
                            {gameState !== 'FLYING' ? (
                                <button onClick={startGame} className="col-span-2 bg-red-600 hover:bg-red-700 py-6 rounded-2xl font-black text-3xl shadow-[0_10px_30px_-5px_rgba(239,68,68,0.5)] transition-all active:scale-95 text-white">
                                    BAHİS YAP
                                </button>
                            ) : (
                                <button 
                                    onClick={cashOut} 
                                    disabled={isCashedOut}
                                    className={`col-span-2 py-6 rounded-2xl font-black text-3xl transition-all active:scale-95 ${isCashedOut ? 'bg-[#374151] text-[#6b7280] cursor-not-allowed shadow-none' : 'bg-green-500 hover:bg-green-600 text-black shadow-[0_10px_30px_-5px_rgba(34,197,94,0.5)]'}`}
                                >
                                    {isCashedOut ? "BEKLENİYOR..." : "NAKİT ÇEK"}
                                </button>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<HighFlyerGame />);
    </script>
</body>
</html>
